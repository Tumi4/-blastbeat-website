[build]
  publish = "."

# Netlify Functions — /api/beat proxies to Claude API for the in-page AI chatbot.
# Set ANTHROPIC_API_KEY in Site settings → Environment variables.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly path for the Beat AI endpoint. The function also declares
# `config.path = "/api/beat"` natively, but this redirect is belt-and-
# suspenders in case the v2 routing isn't honored on first deploy.
[[redirects]]
  from = "/api/beat"
  to = "/.netlify/functions/beat"
  status = 200
  force = true

# Public verify route. Printed licence certificates carry a QR pointing at
# /verify/<short-id>; the rewrite hands that ID to the verify page as ?id=
# so the URL the sponsor sees stays clean.
[[redirects]]
  from = "/verify"
  to = "/pages/verify.html"
  status = 200
[[redirects]]
  from = "/verify/*"
  to = "/pages/verify.html?id=:splat"
  status = 200

# Demo access landing — clean URL for the request-access form. After signup
# the lead is sent straight to the live Blastbeat V2 app (Trixta-hosted at
# trx-3675.devspace.trixta.io); Robert + Tumelo follow up personally by email.
[[redirects]]
  from = "/demo"
  to = "/pages/demo.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.iframe.ly https://www.googletagmanager.com https://*.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://i.ytimg.com https://*.ytimg.com https://*.ggpht.com https://irp.cdn-website.com https://*.cdn-website.com https://drive.google.com https://*.googleusercontent.com https://cdn.iframe.ly https://api.qrserver.com https://www.googletagmanager.com https://*.google-analytics.com https://www.google.com https://www.google.co.uk https://www.google.co.za https://www.google.ie; connect-src 'self' https://cdn.iframe.ly https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://stats.g.doubleclick.net https://demo.blastbeat.com https://app.blastbeat.com https://trx-3675.devspace.trixta.io https://*.devspace.trixta.io; frame-src 'self' https://drive.google.com https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com https://cdn.iframe.ly https://*.iframe.ly https://www.googletagmanager.com https://demo.blastbeat.com https://app.blastbeat.com https://trx-3675.devspace.trixta.io https://*.devspace.trixta.io; media-src 'self' https://drive.google.com; frame-ancestors 'self'; upgrade-insecure-requests"

# Cache static assets (1 year)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Custom 404 — only for pages, not assets
# Netlify automatically serves 404.html for missing pages when the file exists
