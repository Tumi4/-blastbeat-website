<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="Youth performing on stage">
  <style>
    .sketch { stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .sketch-fill { stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; fill: currentColor; fill-opacity: 0.08; }
  </style>
  <!-- Stage platform -->
  <path class="sketch" stroke-width="2.2" d="M14 92 Q16 90 22 90 L98 90 Q104 90 106 92 L108 100 H12 Z"/>
  <path class="sketch" stroke-width="1.5" d="M12 100 H108"/>
  <!-- Stage steps left -->
  <path class="sketch" stroke-width="1.8" d="M22 90 L18 80 L32 80 L34 90"/>
  <!-- Stage steps right -->
  <path class="sketch" stroke-width="1.8" d="M86 90 L84 80 L98 80 L102 90"/>
  <!-- Spotlight left beam -->
  <path class="sketch" stroke-width="1.4" stroke-dasharray="4 2" d="M20 18 L40 78"/>
  <path class="sketch" stroke-width="1.4" stroke-dasharray="4 2" d="M28 16 L48 76"/>
  <!-- Spotlight right beam -->
  <path class="sketch" stroke-width="1.4" stroke-dasharray="4 2" d="M100 18 L80 78"/>
  <path class="sketch" stroke-width="1.4" stroke-dasharray="4 2" d="M92 16 L72 76"/>
  <!-- Performer body -->
  <circle class="sketch-fill" stroke-width="2" cx="60" cy="50" r="9"/>
  <!-- Performer torso -->
  <path class="sketch" stroke-width="2.2" d="M52 60 Q48 68 46 78 Q50 80 60 80 Q70 80 74 78 Q72 68 68 60 Z"/>
  <!-- Performer arms raised in celebration -->
  <path class="sketch" stroke-width="2" d="M52 62 Q44 56 38 48 Q36 44 38 42"/>
  <path class="sketch" stroke-width="2" d="M68 62 Q76 56 82 48 Q84 44 82 42"/>
  <!-- Microphone in right hand -->
  <rect class="sketch-fill" stroke-width="1.8" x="79" y="36" width="6" height="10" rx="3"/>
  <line class="sketch" stroke-width="1.5" x1="82" y1="46" x2="82" y2="52"/>
  <!-- Music notes floating -->
  <path class="sketch" stroke-width="1.6" d="M30 36 Q32 32 36 34 Q34 38 30 36"/>
  <line class="sketch" stroke-width="1.5" x1="36" y1="34" x2="36" y2="26"/>
  <path class="sketch" stroke-width="1.6" d="M86 42 Q88 38 92 40 Q90 44 86 42"/>
  <line class="sketch" stroke-width="1.5" x1="92" y1="40" x2="92" y2="32"/>
</svg>
