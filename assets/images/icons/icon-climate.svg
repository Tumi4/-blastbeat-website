<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="Youth taking climate action">
  <style>
    .sketch { stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .sketch-fill { stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; fill: currentColor; fill-opacity: 0.08; }
  </style>
  <!-- Ground line -->
  <path class="sketch" stroke-width="2" d="M10 98 Q30 94 60 96 Q90 98 110 94"/>
  <!-- Tree trunk -->
  <path class="sketch" stroke-width="2.4" d="M60 96 L60 64"/>
  <path class="sketch" stroke-width="1.8" d="M60 80 Q54 76 50 70"/>
  <path class="sketch" stroke-width="1.8" d="M60 72 Q66 68 70 62"/>
  <!-- Tree canopy -->
  <path class="sketch-fill" stroke-width="2" d="M40 66 Q36 58 40 50 Q44 44 50 42 Q56 38 60 36 Q64 38 70 42 Q76 44 80 50 Q84 58 80 66 Q76 72 70 74 Q64 76 60 76 Q56 76 50 74 Q44 72 40 66 Z"/>
  <!-- Person planting -->
  <circle class="sketch-fill" stroke-width="2" cx="88" cy="70" r="8"/>
  <!-- Body bent forward -->
  <path class="sketch" stroke-width="2.2" d="M82 78 Q80 84 82 90 Q86 92 92 90 Q96 88 96 84 L88 80 Z"/>
  <!-- Arm reaching down with sapling -->
  <path class="sketch" stroke-width="2" d="M82 80 Q78 86 76 92"/>
  <!-- Small sapling -->
  <path class="sketch" stroke-width="1.8" d="M76 92 L76 82"/>
  <path class="sketch" stroke-width="1.6" d="M76 86 Q72 82 70 78"/>
  <path class="sketch" stroke-width="1.6" d="M76 84 Q80 80 82 76"/>
  <!-- Sun -->
  <circle class="sketch" stroke-width="1.8" cx="24" cy="26" r="10"/>
  <line class="sketch" stroke-width="1.5" x1="24" y1="10" x2="24" y2="14"/>
  <line class="sketch" stroke-width="1.5" x1="24" y1="38" x2="24" y2="42"/>
  <line class="sketch" stroke-width="1.5" x1="10" y1="26" x2="14" y2="26"/>
  <line class="sketch" stroke-width="1.5" x1="34" y1="26" x2="38" y2="26"/>
  <line class="sketch" stroke-width="1.5" x1="14" y1="16" x2="17" y2="19"/>
  <line class="sketch" stroke-width="1.5" x1="31" y1="33" x2="34" y2="36"/>
  <line class="sketch" stroke-width="1.5" x1="34" y1="16" x2="31" y2="19"/>
  <line class="sketch" stroke-width="1.5" x1="17" y1="33" x2="14" y2="36"/>
  <!-- Leaf floating -->
  <path class="sketch-fill" stroke-width="1.6" d="M98 44 Q104 38 110 40 Q106 48 98 44 Z"/>
  <path class="sketch" stroke-width="1.4" d="M98 44 L104 40"/>
</svg>
